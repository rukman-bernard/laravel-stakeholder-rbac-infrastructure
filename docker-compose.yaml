services:
  # ---------------------------------------------------------------------------
  # MariaDB (primary database)
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:10.11
    restart: unless-stopped

    # Host access (dev convenience). Inside Docker network, use host "db".
    ports:
      - "3306:3306"

    environment:
      # NOTE: MariaDB requires a root password even for local dev
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    volumes:
      # Persistent DB data
      - mariadb_data:/var/lib/mysql
      # Custom MySQL/MariaDB config (read-only)
      - ./my.cnf:/etc/mysql/conf.d/my.cnf:ro

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - nka

  # ---------------------------------------------------------------------------
  # Redis (cache/queue/session depending on Laravel config)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:alpine
    restart: unless-stopped

    # Host access (dev convenience). Inside Docker network, use host "redis".
    ports:
      - "6380:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

    networks:
      - nka

  # ---------------------------------------------------------------------------
  # Laravel (PHP-FPM)
  # - Exposes port 9000 to other containers (nginx), not to host directly
  # ---------------------------------------------------------------------------
  laravel:
    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped
    working_dir: /var/www/html

    # Run as your host user to avoid permission issues on bind-mounted files
    user: "1000:1000"
    environment:
      HOME: /tmp

    volumes:
      # Bind mount project into container for live dev
      - .:/var/www/html

    expose:
      - "9000"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - nka

  # ---------------------------------------------------------------------------
  # Nginx (HTTP entrypoint)
  # - Serves public/ and forwards PHP requests to laravel:9000
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped

    ports:
      - "8000:80"

    volumes:
      # Needs project files to serve public/ assets
      - .:/var/www/html
      # Nginx site config (read-only)
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - laravel

    networks:
      - nka

  # ---------------------------------------------------------------------------
  # Node (Vite dev server)
  # - Keeps node_modules in a named volume to avoid reinstalling every run
  # ---------------------------------------------------------------------------
  node:
    image: node:18-alpine
    restart: unless-stopped

    working_dir: /var/www/html
    entrypoint: ["/usr/local/bin/node-entrypoint"]

    environment:
      # File watching is flaky across bind mounts; polling is more reliable in Docker
      CHOKIDAR_USEPOLLING: "true"

    ports:
      - "5173:5173"

    volumes:
      # Project source
      - .:/var/www/html
      # Persist node_modules between container recreations
      - node_modules:/var/www/html/node_modules
      # Custom entrypoint script (read-only)
      - ./docker/node/entrypoint.sh:/usr/local/bin/node-entrypoint:ro

    depends_on:
      - laravel

    networks:
      - nka

  # ---------------------------------------------------------------------------
  # phpMyAdmin (development only)
  # ---------------------------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin
    restart: unless-stopped

    ports:
      - "8080:80"

    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USERNAME}
      PMA_PASSWORD: ${DB_PASSWORD}

    depends_on:
      db:
        condition: service_healthy

    networks:
      - nka

# -----------------------------------------------------------------------------
# Named volumes (persist data across container rebuilds)
# -----------------------------------------------------------------------------
volumes:
  mariadb_data:
  redis_data:
  node_modules:

# -----------------------------------------------------------------------------
# Internal network (service-name DNS: db, redis, laravel, nginx, node, phpmyadmin)
# -----------------------------------------------------------------------------
networks:
  nka:
    driver: bridge