server {
    listen 80;
    # server_name nka.test *.nka.test;

    root /var/www/html/public;
    index index.php index.html;

    # Docker DNS resolver (fixes "host not found in upstream laravel")
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Optional: adjust if you upload files
    client_max_body_size 20m;

    # Main routing (Laravel front controller)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM (Laravel)
    location ~ \.php$ {
        try_files $uri =404;

        # Prefer fastcgi.conf if available (nginx:alpine includes it)
        include fastcgi.conf;

        # Use variable so nginx re-resolves laravel via Docker DNS
        set $upstream laravel:9000;
        fastcgi_pass $upstream;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Security: deny access to hidden files (except ACME challenge)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
