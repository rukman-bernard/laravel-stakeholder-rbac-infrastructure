server {
    # Listen on container port 80 (mapped to host in docker-compose)
    listen 80;

    # Catch-all server_name for local/dev containers
    server_name _;

    # Laravel public directory is the web root (ONLY /public is web-accessible)
    root /var/www/html/public;

    # Laravel front controller
    index index.php;

    # Safe default charset for HTML responses
    charset utf-8;

    # Upload size limit (keep aligned with PHP upload limits if you change this)
    client_max_body_size 20m;

    # Basic performance toggles (works well for typical Laravel responses)
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # ------------------------------------------------------------
    # Security Headers
    # These are safe defaults for most Laravel apps.
    # ------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;                  # Prevent clickjacking (allow same-site framing)
    add_header X-Content-Type-Options "nosniff" always;              # Prevent MIME sniffing
    add_header X-XSS-Protection "1; mode=block" always;              # Legacy XSS protection (mostly for older browsers)
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ------------------------------------------------------------
    # Gzip Compression
    # Compress text responses to reduce bandwidth (good for CSS/JS/JSON).
    # ------------------------------------------------------------
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # ------------------------------------------------------------
    # Dynamic endpoints that MUST go through Laravel/PHP
    #
    # Why: some Livewire temporary preview URLs can end with ".jpg/.png",
    # which would otherwise be mistaken as static assets by regex rules.
    # Using ^~ ensures nginx prefers this block over regex locations.
    # ------------------------------------------------------------
    location ^~ /livewire/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Optional examples (enable only if/when you use these):
    # location ^~ /broadcasting/ { try_files $uri $uri/ /index.php?$query_string; }
    # location ^~ /sanctum/      { try_files $uri $uri/ /index.php?$query_string; }
    # location ^~ /api/          { try_files $uri $uri/ /index.php?$query_string; }

    # ------------------------------------------------------------
    # Static Assets (cached for performance)
    # These are served directly by nginx (no PHP) and cached by browsers.
    # ------------------------------------------------------------
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ------------------------------------------------------------
    # Do NOT cache HTML responses
    # HTML pages change frequently (auth state, flash messages, etc.)
    # ------------------------------------------------------------
    location ~* \.(?:html)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    }

    # ------------------------------------------------------------
    # Main Laravel Routing
    # If the file doesn't exist, route everything to index.php (Laravel).
    # ------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ------------------------------------------------------------
    # PHP-FPM (Laravel app container)
    # Only actual .php files are executed via PHP-FPM.
    # ------------------------------------------------------------
    location ~ \.php$ {
        try_files $uri =404;

        include fastcgi.conf;
        fastcgi_pass laravel:9000;

        # Prevent long-running requests from timing out too aggressively
        fastcgi_read_timeout 60;
        fastcgi_send_timeout 60;
        fastcgi_connect_timeout 60;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # ------------------------------------------------------------
    # Block hidden files (e.g., .env, .git, etc.)
    # Exception: allow /.well-known for ACME challenges if needed.
    # ------------------------------------------------------------
    location ~ /\.(?!well-known).* {
        deny all;
    }
}